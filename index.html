<!DOCTYPE html>

<!--
  Theme options: theme-auto | theme-light | theme-dark
-->

<html class="theme-dark" lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page Title -->
    <title>Noxy | Links</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
    <link rel="apple-touch-icon" href="/images/avatar.png">
    <meta name="theme-color" content="#0E1A38">

    <!-- Meta Description -->
    <meta name="description" content="Noxy — links to art Twitter, SFW Twitter, Bluesky, and TikTok.">

    <!-- Keywords -->
    <meta name="keywords" content="noxy, noxyart, noxybutt, artist">

    <!-- Author Information -->
    <meta name="author" content="Noxy">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

  </head>

<body>

    <div class="container">
        <div class="column">

            <!--
              Avatar rounding: avatar--rounded | avatar--soft | avatar--none
            -->
            <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="Noxy">

            <h1>
              <div>Noxy</div>
            </h1>

            <!-- Bio -->
            <p class="bio-flags"><img class="flag" src="images/icons/flag-nb.svg" alt="Non-binary flag"> / 28 / <img class="flag" src="images/icons/flag-au.svg" alt="Australian flag"></p>
            <p class="bio-quote">The Senses deceive us from time to time</p>

            <!-- All your buttons go here -->
            <div class="button-stack" role="navigation">

              <!-- Twitter (Art) -->
              <a class="button button-kip" href="https://x.com/Noxyart" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/x.svg" alt="X Logo">Twitter (Art)</a>

              <!-- Twitter (SFW) -->
              <a class="button button-kip" href="https://x.com/Noxybutt" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/x.svg" alt="X Logo">Twitter (SFW)</a>

              <!-- Bluesky -->
              <a class="button button-kip" href="https://bsky.app/profile/noxybutt.com" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/bluesky.svg" alt="Bluesky Logo">Bluesky</a>

              <!-- TikTok -->
              <a class="button button-kip" href="https://www.tiktok.com/@noxybutt" target="_blank" rel="noopener" role="button"><img class="icon" aria-hidden="true" src="images/icons/tiktok.svg" alt="TikTok Logo">TikTok</a>

      </div>

      <footer>
        <a href="privacy.html">Privacy Policy</a> | Build your own by forking <a href="https://littlelink.io" target="_blank" rel="noopener">LittleLink</a>
      </footer>

    </div>
  </div>

</body>

</html>
